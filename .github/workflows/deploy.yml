name: Deploy Frontend to Operation Server
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Branch check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync branch Master to Operation
        run: |
          git config --global user.name "deploy-manager"
          git config --global user.email "wuwang8484@gmail.com"
          git checkout operation || git checkout -b operation
          git reset --hard master
          git push origin operation --force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Authenticate GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build and Push to GHCR
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_LOWER/galaxy-archive-fe:latest .
          docker push ghcr.io/$REPO_LOWER/galaxy-archive-fe:latest

      - name: Copy docker application composes
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.frontend.yml"
          target: "~/galaxyarchive"
          overwrite: true

      - name: Deploy to Operation Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            cd ~/galaxyarchive
            export REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
                        
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            
            rm -f .front.env
            
            echo "INTERNAL_API_URL='${{ secrets.INTERNAL_API_URL }}'" >> .front.env
            
            REPO_LOWER=$REPO_LOWER docker compose -f docker-compose.frontend.yml pull galaxy-archive-fe
            REPO_LOWER=$REPO_LOWER docker compose -f docker-compose.frontend.yml up -d galaxy-archive-fe